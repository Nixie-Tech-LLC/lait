# Cross-platform CI + supply-chain gate. Builds, lints, and tests lait on
# Linux, macOS, and Windows so the daemon's control channel + single-instance
# lock stay portable. The Windows job is load-bearing — it fails the moment
# anyone reintroduces a unix-only API (a Unix-domain socket, flock(2), os::fd, …)
# into the control/lock path.
name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  # The web client (`lait serve`'s UI). Its build output is COMMITTED under
  # src/serve/assets because `include_dir!` embeds it at compile time and
  # `cargo install lait` must not need npm (docs/SERVE.md). Committed build output
  # goes stale the first time someone edits viewer/ and forgets to rebuild — and
  # it would go stale *silently*, shipping a binary whose UI predates its API. So
  # this job rebuilds and fails if the result differs from what's in git.
  viewer:
    name: viewer
    runs-on: namespace-profile-nixiesoftware
    steps:
      # SHA-pinned like every other action here: a tag is mutable, and CI is
      # exactly where you don't want a dependency that can change under you.
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: viewer/package-lock.json

      # `npm ci` (not `install`) so the lockfile is authoritative and CI cannot
      # quietly resolve a different tree than a developer did.
      - name: Install
        run: npm ci
        working-directory: viewer

      - name: Typecheck
        run: npm run check
        working-directory: viewer

      - name: Test
        run: npm test
        working-directory: viewer

      - name: Build
        run: npm run build
        working-directory: viewer

      - name: Assert the committed bundle is what viewer/ builds
        run: |
          if ! git diff --exit-code --stat -- src/serve/assets; then
            echo "::error::src/serve/assets is stale — run 'npm run build' in viewer/ and commit the result."
            exit 1
          fi

  # Build, lint (fmt + clippy), test, smoke-run, and the TLS-backend
  # guard on every supported OS. This is the portability gate: everything must
  # be green on all three, not just unix. clippy runs per-OS so the cfg-gated
  # control channel (unix socket vs named pipe) is linted on both.
  check:
    name: check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [namespace-profile-nixiesoftware, macos-latest, windows-latest]
    env:
      RUSTFLAGS: "-D warnings"
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      # dtolnay/rust-toolchain@stable (branch head at time of pinning). The ref used
      # to select the channel, so `toolchain` is now passed explicitly.
      - name: Install Rust (stable + rustfmt + clippy)
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Cache cargo build
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      # nextest runs test binaries in PARALLEL; `cargo test` runs them serially, so
      # the multi-node integration suite paid the sum of per-binary times. Prebuilt
      # binary install — no compile cost.
      # taiki-e/install-action@nextest (the maintainer re-points this tag, so it is
      # a moving target with no semver equivalent). The ref used to select the tool,
      # so `tool` is now passed explicitly.
      - name: Install nextest
        uses: taiki-e/install-action@e658debeddbabf20b2b866d9235eb08a2375b1ad
        with:
          tool: nextest

      - name: Format check
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings

      # --locked pins the committed Cargo.lock, so the portable dependency set
      # (interprocess, fs2, and the `ring` TLS backend) can't drift under CI.
      # --workspace is load-bearing on every cargo invocation in this job: the
      # root package plus six concept crates form the workspace, and a bare
      # `cargo test`/`nextest run` covers ONLY the root package (218 of 706
      # tests at the time this comment was written) — silently skipping every
      # mechanics/fabric/replica/runtime/comms/journal suite.
      - name: Build
        run: cargo build --workspace --locked --all-targets --all-features

      # nextest parallelizes across test binaries (the `Build` step above already
      # compiled `--all-targets`, so examples/bins are covered there).
      - name: Test
        run: cargo nextest run --workspace --locked --all-features

      # nextest does not run doctests; run them explicitly so documented examples
      # (and the DTO/parity doc examples) can't rot.
      - name: Doctests
        run: cargo test --workspace --locked --doc --all-features

      # Portability guard: the control channel + single-instance lock MUST stay
      # cross-platform. Fail if a unix-only primitive is named outside an
      # explicit #[cfg(unix)] island in those paths. The Windows job compiling is
      # the primary gate; this catches a regression at review time on any OS.
      - name: Portability guard (no unix-only APIs in control/lock path)
        shell: bash
        run: bash ci/portability-guard.sh

      # End-to-end smoke against the REAL binary (no network): drive the P0
      # tracker flow — create a project + issues, render the board, edit an
      # issue, and read the activity feed — asserting on observed output. Proves
      # the daemon + control channel + Loro store + CLI all work on this OS.
      # Grows per phase (P1: two nodes converge + a TUI client rebaselines on
      # Reset; P3: a non-member sees only ciphertext).
      - name: Smoke run (P0 tracker flow)
        shell: bash
        run: |
          set -euo pipefail
          export LAIT_HOME="$(mktemp -d)"
          export LAIT_IDLE_SECS=0
          # Capture output into a variable rather than piping into `grep -q`: an
          # early-closing reader (grep -q, head) would send SIGPIPE to the CLI —
          # which now resets SIGPIPE to default for clean interactive piping — and
          # under `pipefail` that races the smoke. Capturing drains stdout fully,
          # so the assertions are deterministic regardless of buffering/timing.
          # Invoke the built binary directly. `cargo run` would re-enter cargo
          # for every one of these ~15 calls — workspace discovery, lockfile
          # check, and fingerprinting each time — for a binary the Build step
          # already produced. This is still the real binary, which is the point
          # of a smoke test; it just stops paying cargo's startup per command.
          LAIT_BIN="target/debug/lait"
          [ -x "$LAIT_BIN" ] || LAIT_BIN="target/debug/lait.exe"
          [ -x "$LAIT_BIN" ] || { echo "::error::no built lait binary at target/debug"; exit 1; }
          LAIT_BIN="$(cd "$(dirname "$LAIT_BIN")" && pwd)/$(basename "$LAIT_BIN")"
          bin() { "$LAIT_BIN" "$@"; }
          has() { case "$1" in *"$2"*) : ;; *) echo "::error::expected '$2' in:"; echo "$1"; exit 1 ;; esac; }
          # id is 64 lowercase hex chars
          id_out="$(bin id)"
          [[ "$id_out" =~ ^[0-9a-f]{64}$ ]] || { echo "::error::bad id: $id_out"; exit 1; }
          # spaces are founded explicitly (no lazy mint); founding seeds a project
          bin init --name Smoke
          bin projects add ENG Engineering
          bin new "fix login race" -p ENG -P high >/dev/null
          bin new "add dark mode"  -p ENG -P low  >/dev/null
          # board shows both issues in Backlog
          board="$(bin board ENG)"; has "$board" "fix login race"; has "$board" "add dark mode"
          # the work loop: start assigns + activates; done completes (S§5.7)
          start_out="$(bin start ENG-1 --no-branch)"; has "$start_out" "in_progress"
          board="$(bin board ENG)"; has "$board" "In Progress"; has "$board" "fix login race"
          bin done ENG-2 >/dev/null
          ls_out="$(bin ls)"; has "$ls_out" "fix login race"
          # activity feed records the transitions
          act="$(bin activity)"; has "$act" "created"; has "$act" "started"
          # the machine registry lists the founded space
          spaces_out="$(bin spaces)"; has "$spaces_out" "Smoke"
          bin shutdown || true
          echo "P0 smoke flow OK on ${{ matrix.os }}"

      # Defense-in-depth beyond the cargo-deny ban: fail if the aws-lc-* rustls
      # backend is actually LINKED on THIS platform (a backend swap can be
      # per-target). We assert on real linkage, not mere Cargo.lock presence:
      # `cargo tree -i <crate>` prints the reverse-dependency tree to STDOUT only
      # when the crate is genuinely in the build graph. A crate that is only
      # pinned in Cargo.lock as an inactive optional dependency (e.g. rustls
      # records aws-lc-rs's version even when the `ring` provider is the one
      # selected) yields empty stdout — its "nothing to print" note goes to
      # stderr — and must pass, because nothing C is compiled or linked.
      - name: Assert portable TLS backend (no aws-lc-*)
        shell: bash
        run: |
          set -euo pipefail
          bad=0
          for crate in aws-lc-rs aws-lc-sys aws-lc-fips-sys; do
            if [ -n "$(cargo tree --locked -e no-dev -i "$crate" 2>/dev/null)" ]; then
              echo "::error::$crate is linked into the build — the build must use the portable 'ring' rustls backend."
              bad=1
            fi
          done
          exit "$bad"

  # ---------------------------------------------------------------------------
  # Orbital release gates (plan 50): each named job proves one mandatory
  # artifact family from the verification matrix, on a clean checkout of the
  # identical commit. The full workspace suite in `check` subsumes these tests;
  # naming them as separate required jobs is the point — a deleted or renamed
  # gate turns a green aggregate red instead of silently narrowing coverage.
  # nextest `binary()` filters match test binaries across the whole workspace,
  # and an expression that matches nothing fails the run rather than skipping.
  orbital-gates:
    name: ${{ matrix.job }}
    runs-on: namespace-profile-nixiesoftware
    strategy:
      fail-fast: false
      matrix:
        include:
          - job: orbital-boundaries
            filter: "binary(orbital_boundaries)"
          - job: orbital-clean-break
            filter: "binary(orbital_clean_break) + binary(semantic_type_names) + binary(mixed_root_guard)"
          - job: orbital-authority
            filter: "binary(authority_history) + binary(authority_checkpoint) + binary(world_policy) + binary(ceremony_frontier_isolation)"
          - job: orbital-formats
            filter: "binary(dto_schema) + binary(product_schema) + binary(coordinates_fixtures) + binary(contact_fixtures) + binary(beacon_presence_fixtures) + binary(manifest_fixtures) + binary(transaction_marker_fixtures) + binary(canonical_ids) + binary(canonical_store) + binary(algebra_fixtures)"
          - job: orbital-faults
            filter: "binary(journal_faults) + binary(journal_child_crash) + binary(manifest_atomicity) + binary(orbital_catalog) + binary(concurrent_heads)"
          - job: orbital-contact-real
            filter: "binary(contact_iroh) + binary(contact_mem)"
          - job: orbital-bootstrap-real
            filter: "binary(orbital_join_iroh) + binary(orbital_admission) + binary(orbital_concurrent_catalog)"
          - job: orbital-ceremonies
            filter: "binary(orbital_ceremonies) + binary(mechanics_sparse_ceremony)"
          - job: orbital-independent-world
            filter: "binary(independent_world) + binary(orbital_adoption)"
          - job: orbital-product-parity
            filter: "binary(orbital_product_parity) + binary(issues_policy_designer) + binary(orbital_daemon_lifecycle) + binary(control_classification) + binary(mcp_parity) + binary(viewer_parity)"
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30
        with:
          toolchain: stable
      - name: Cache cargo build
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Install nextest
        uses: taiki-e/install-action@e658debeddbabf20b2b866d9235eb08a2375b1ad
        with:
          tool: nextest
      # --workspace is load-bearing: without it cargo builds only the root
      # package, so filters naming crate-level binaries (runtime::dto_schema,
      # mechanics::ceremony_frontier_isolation, …) silently select nothing —
      # nextest's no-tests failure (exit 4) is what catches that, and partial
      # matches would be worse: a gate that runs SOME of its binaries reads as
      # green while skipping the rest. The list step makes the selection
      # visible in the log before anything runs.
      - name: List selected tests
        run: cargo nextest list --workspace --locked --all-features -E '${{ matrix.filter }}'
      - name: Run gate
        run: cargo nextest run --workspace --locked --all-features -E '${{ matrix.filter }}'
      # The formats gate additionally replays the committed schema examples
      # through a NON-Rust JSON Schema 2020-12 validator, so the external
      # contract is proven language-neutral, not merely serde-consistent.
      - name: Language-neutral schema validation
        if: matrix.job == 'orbital-formats'
        # A venv, not system pip: PEP-668 "externally-managed" images (e.g.
        # the Namespace Ubuntu 24.04 runners) refuse bare `pip install`.
        run: |
          python3 -m venv .schema-venv
          .schema-venv/bin/pip install --quiet "jsonschema>=4"
          .schema-venv/bin/python ci/validate-dto-schema.py

  # Aggregate required check: green only when every orbital gate (and the
  # cross-platform workspace matrix) is green. Branch protection points here so
  # a skipped or cancelled gate can never satisfy the release bar.
  orbital-complete:
    name: orbital-complete
    runs-on: namespace-profile-nixiesoftware
    needs: [check, orbital-gates, viewer]
    if: always()
    steps:
      - name: Assert every dependency succeeded
        run: |
          results='${{ toJSON(needs) }}'
          echo "$results"
          echo "$results" | grep -q '"result": *"failure"' && exit 1
          echo "$results" | grep -q '"result": *"cancelled"' && exit 1
          echo "$results" | grep -q '"result": *"skipped"' && exit 1
          exit 0

  # Verify the MSRV floor holds. The floor is driven by iroh 1.0.0-rc.1 (rustc
  # 1.91). If this breaks, either the floor moved or a dep raised its MSRV.
  msrv:
    name: msrv (1.91)
    runs-on: namespace-profile-nixiesoftware
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      # dtolnay/rust-toolchain@1.91.0 (branch head at time of pinning) — the same
      # commit publish-crates.yml pins for the MSRV floor.
      #
      # NOTE: unlike the @stable branch, the version branches declare NO `toolchain`
      # input — the branch name IS the toolchain, baked into that commit. Passing
      # `toolchain:` here is not an error, it is silently ignored with an
      # "Unexpected input(s)" warning, which is worse: the file would claim to set
      # something it does not. The comment above is what records the version.
      - name: Install Rust 1.91
        uses: dtolnay/rust-toolchain@ad7910d95e317a4b12a9a3dfad520f4b409b3ec0
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      # rust-toolchain.toml at the repo root pins `channel = "stable"`, and rustup
      # ranks that file ABOVE the default toolchain — so without this override the
      # job would silently `cargo check` on stable, not 1.91, and the MSRV floor
      # could drift upward undetected. RUSTUP_TOOLCHAIN outranks rust-toolchain.toml,
      # forcing the 1.91.0 toolchain installed above.
      - name: Check on MSRV
        env:
          RUSTUP_TOOLCHAIN: "1.91.0"
        run: cargo check --workspace --locked --all-targets --all-features

  # Supply-chain gate: advisories + licenses + bans + sources (deny.toml). The
  # bans list forbids the aws-lc-* backends so the portable `ring` backend can't
  # drift in transitively.
  supply-chain:
    name: cargo-deny
    runs-on: namespace-profile-nixiesoftware
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: cargo-deny
        uses: EmbarkStudios/cargo-deny-action@3c6349835b2b7b196a839186cb8b78e02f7b5f25 # v2.1.1
        with:
          command: check

  # Release dry-run: `dist plan` must succeed for every configured target
  # (including the Windows target added now that the control channel is
  # portable). This gates release-engineering drift on every PR, long before a
  # tag is pushed. It only PLANS — it never builds or publishes.
  release-dry-run:
    name: release dry-run (dist plan)
    runs-on: namespace-profile-nixiesoftware
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Install dist
        shell: bash
        run: curl --proto '=https' --tlsv1.2 -LsSf https://github.com/axodotdev/cargo-dist/releases/download/v0.32.0/cargo-dist-installer.sh | sh
      - name: dist plan (all targets, incl. Windows)
        shell: bash
        run: |
          set -euo pipefail
          dist plan --output-format=json > plan.json
          cat plan.json
          # Assert the Windows target is present in the plan so it can't silently
          # regress back out of the release matrix.
          grep -q 'x86_64-pc-windows-msvc' plan.json \
            || { echo "::error::Windows target missing from dist plan"; exit 1; }

  # The self-updater's in-archive binary path is a claim about cargo-dist's
  # layout, and the unit tests can only check it against our MODEL of that
  # layout. The model was wrong twice — v0.4.8 and v0.5.0 shipped a Windows path
  # of `lait.exe.exe`, so `lait update` was dead on Windows for every user, and
  # nothing caught it because the test just restated the code. This job closes
  # the loop against reality: it downloads the archives users actually download
  # and asserts the path self_update would extract is really in them.
  #
  # It validates the CURRENT tree's updater against the LATEST release — exactly
  # the operation `lait update` performs — so a cargo-dist layout change breaks
  # CI here rather than stranding users on a binary that cannot update itself.
  updater-contract:
    name: self-updater archive contract
    runs-on: namespace-profile-nixiesoftware
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      # This job compiles the library to run one test, so it needs the same
      # pinned toolchain and the same cache as the check matrix. Without the
      # cache it rebuilds the whole dependency graph from scratch and becomes
      # the workflow's critical path — minutes of compiling to run one
      # assertion that takes milliseconds.
      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30
        with:
          toolchain: stable

      - name: Cache cargo build
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Fetch the latest release's archives
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-archives
          gh release download --repo "$GITHUB_REPOSITORY" -D release-archives --clobber \
            -p 'lait-x86_64-pc-windows-msvc.zip' \
            -p 'lait-aarch64-apple-darwin.tar.gz' \
            -p 'lait-x86_64-apple-darwin.tar.gz' \
            -p 'lait-aarch64-unknown-linux-gnu.tar.gz' \
            -p 'lait-x86_64-unknown-linux-gnu.tar.gz'
          ls -l release-archives
      - name: Assert the updater's path resolves inside them
        shell: bash
        env:
          LAIT_RELEASE_ARCHIVES: release-archives
        run: cargo test --lib -- --ignored --exact app::tests::update_bin_path_is_a_real_entry_in_the_published_archives

  # Packaging manifests (Scoop + winget) are hand-maintained templates that the
  # release CD (publish-scoop / publish-winget) stamps with each release's real
  # version + hash. CI can't check the version/hash (they don't exist until a
  # release builds them), so it gates *structure* only: the manifests must parse
  # and carry the identifiers/URLs the CD relies on, so a typo can't reach main
  # and silently break a publish job weeks later at release time.
  packaging:
    name: packaging manifests
    runs-on: namespace-profile-nixiesoftware
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Validate Scoop manifest (JSON + required keys)
        shell: bash
        run: |
          set -euo pipefail
          f=packaging/scoop/lait.json
          jq empty "$f"
          # Required fields the bucket + autoupdate rely on.
          for path in '.version' '.architecture."64bit".url' '.architecture."64bit".bin' \
                      '.checkver' '.autoupdate.architecture."64bit".url' '.autoupdate.hash.url'; do
            v=$(jq -er "$path" "$f") \
              || { echo "::error file=$f::missing Scoop field $path"; exit 1; }
          done
          # The download host must be the canonical GitHub release path.
          jq -er '.architecture."64bit".url' "$f" | grep -q 'github.com/Nixie-Tech-LLC/lait/releases' \
            || { echo "::error file=$f::Scoop url is not a Nixie-Tech-LLC/lait GitHub release"; exit 1; }
          echo "Scoop manifest OK"

      - name: Validate winget manifests (YAML + cross-file identifier)
        shell: bash
        run: |
          set -euo pipefail
          # venv, not system pip: PEP-668 images refuse bare `pip install`.
          python3 -m venv .pkg-venv
          .pkg-venv/bin/pip install --quiet "PyYAML>=6"
          .pkg-venv/bin/python - <<'PY'
          import glob, sys, yaml
          files = sorted(glob.glob("packaging/winget/*.yaml"))
          assert files, "no winget manifests found"
          ids, types = set(), set()
          for f in files:
              doc = yaml.safe_load(open(f, encoding="utf-8"))
              assert doc.get("PackageIdentifier"), f"{f}: missing PackageIdentifier"
              assert doc.get("PackageVersion"), f"{f}: missing PackageVersion"
              ids.add(doc["PackageIdentifier"])
              types.add(doc.get("ManifestType"))
          assert len(ids) == 1, f"PackageIdentifier differs across manifests: {ids}"
          for req in ("version", "installer", "defaultLocale"):
              assert req in types, f"missing a '{req}' manifest (have {types})"
          print(f"winget manifests OK — {sorted(ids)[0]}, {len(files)} files")
          PY
