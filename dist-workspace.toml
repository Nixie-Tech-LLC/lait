[workspace]
members = ["cargo:."]

# Config for 'dist'
[dist]
# The preferred dist version to use in CI (Cargo.toml SemVer syntax)
cargo-dist-version = "0.32.0"
# CI backends to support
ci = "github"
# The installers to generate for each app. `shell` for unix, `powershell` for
# Windows (now that the control channel is a portable named pipe, not a Unix
# socket), and `homebrew` — which generates `lait.rb` as a release artifact. We
# deliberately do NOT set `publish-jobs = ["homebrew"]`: the formula is pushed to
# the tap by our own `publish-homebrew.yml`, which mints a short-lived token from
# the org GitHub App (durable, no static PAT) rather than a stored secret.
# install.sh / install.ps1 + the self-updater cover upgrades.
installers = ["shell", "powershell", "homebrew"]
# Homebrew tap the formula targets: `brew install nixie-tech-llc/tap/lait`
# (github.com/Nixie-Tech-LLC/homebrew-tap). cargo-dist only *generates* lait.rb as
# a release asset — the push to the tap (and the Scoop/winget publishes) is done by
# our own `publish-*.yml` workflows, triggered on the Release workflow completing
# (`workflow_run`), which fires even though cargo-dist creates the release with the
# default GITHUB_TOKEN (a `release:` trigger would not).
tap = "Nixie-Tech-LLC/homebrew-tap"
# Target platforms to build apps for (Rust target-triple syntax). Windows is
# now included: the daemon's control channel is a cross-platform local IPC
# channel (named pipe on Windows via `interprocess`), and the single-instance
# lock is a portable advisory lock (`fs2`), so the binary builds and runs on
# Windows the same as unix.
targets = [
    "aarch64-apple-darwin",
    "aarch64-unknown-linux-gnu",
    "x86_64-apple-darwin",
    "x86_64-unknown-linux-gnu",
    "x86_64-pc-windows-msvc",
]
# Path that installers should place binaries in
install-path = "CARGO_HOME"
# Where to host releases
hosting = "github"
# Ship no external updater: `lait update` is a native, in-process self-updater
# (src/app.rs) that pulls the latest release itself.
install-updater = false
# Use gzip (not xz) for unix archives so the native updater can extract release
# assets with pure-Rust inflate (no liblzma/C dependency). Windows stays .zip.
unix-archive = ".tar.gz"
# Own the per-target build so we can sign the binary BEFORE it is archived
# (cargo-dist's `dist build` compiles + archives atomically, with no hook to sign
# in between, and its built-in signers can't do macOS notarization or Azure).
# cargo-dist replaces its default build job with a call to our reusable workflow
# `.github/workflows/build-binaries.yml`, then still owns installers, the unified
# checksum, release creation, and the publishers. See docs/RELEASE-SIGNING.md.
build-local-artifacts = false
local-artifacts-jobs = ["./build-binaries"]
# The custom build job attests its own archives, so it needs id-token +
# attestations write (cargo-dist sets these on the job that calls the workflow).
github-custom-job-permissions = { "build-binaries" = { contents = "read", "id-token" = "write", attestations = "write" } }

# SLSA build provenance: cargo-dist wires `actions/attest-build-provenance` into
# the release, producing a cryptographic attestation that each artifact was built
# by THIS repo's Release workflow (not a laptop). Free for public repos; verify
# with `gh attestation verify <file> --repo Nixie-Tech-LLC/lait`. This is
# provenance, not OS gatekeeping — it does not affect SmartScreen/Gatekeeper.
github-attestations = true
# Software Bill of Materials: we generate a CycloneDX SBOM per release, but NOT
# via cargo-dist's built-in `cargo-cyclonedx = true`. That option is broken in
# cargo-dist v0.32.0 (the latest): its generated release.yml references
# `steps.cargo-cyclonedx.output.paths` (template line 458) — `output` should be
# `outputs` — so the `.cdx.xml` renders to an empty path and never reaches the
# uploaded bundle. The SBOM is instead produced and uploaded by our own
# `.github/workflows/publish-sbom.yml`, decoupled on `workflow_run` like the
# homebrew/scoop/winget publishers. Re-enable the built-in once upstream fixes
# the typo.
