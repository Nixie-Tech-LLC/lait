# nextest runs test binaries in parallel — the main lever for the multi-node
# integration suite, which `cargo test` ran serially. This config keeps that fast
# path both quick and reliable.

# Bound how many network-heavy tests run at once. Each integration test spawns
# real daemons doing P2P over iroh (endpoint + relay); nextest otherwise scales
# concurrency to num-cpus, so on a high-core SELF-HOSTED runner it would fire many
# at once — dozens of daemons hammering the relay — trading speed for flakiness.
# Capping at a fixed, core-independent number keeps contention sane. The suite's
# long pole is a single ~8s test, so this barely costs wall-clock; raise it if the
# integration suite grows and the runners can take the load.
[test-groups]
network = { max-threads = 4 }

[profile.default]
# The multi-node tests do real P2P over iroh; a relay/discovery hiccup can fail a
# run that a retry clears. One retry trades a little time on a rare flake for a
# stable pipeline (a test that fails deterministically still fails).
retries = 1

# Surface a wedged test (e.g. a daemon that never bound its control channel)
# instead of hanging the job: warn at 30s, terminate after 3 periods (90s). The
# slowest real tests are the ~30s hermetic_net convergence pair, so this is a
# margin, not a tuning knob.
#
# This budget assumes DEPENDENCIES ARE BUILT OPTIMIZED — see
# `[profile.dev.package."*"]` in Cargo.toml. Tests inherit the `dev` profile, and
# with unoptimized curve25519-dalek/frost-ed25519 the ceremony tests (real DKG +
# threshold signing) take ~115s each and get terminated here. If these start
# timing out, check that profile before reaching for a larger budget.
slow-timeout = { period = "30s", terminate-after = 3 }

# All integration tests (the `tests/` dir, target kind `test`) spawn daemons, so
# cap their concurrency via the `network` group; the lib/unit tests are CPU-bound
# and stay unbounded. New integration tests join the cap automatically.
[[profile.default.overrides]]
filter = 'kind(test)'
test-group = 'network'
