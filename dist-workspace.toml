[workspace]
members = ["cargo:."]

# Config for 'dist'
[dist]
# The preferred dist version to use in CI (Cargo.toml SemVer syntax)
cargo-dist-version = "0.32.0"
# CI backends to support
ci = "github"
# The installers to generate for each app. `shell` for unix, `powershell` for
# Windows (now that the control channel is a portable named pipe, not a Unix
# socket), and `homebrew` — which generates `lait.rb` as a release artifact. We
# deliberately do NOT set `publish-jobs = ["homebrew"]`: the formula is pushed to
# the tap by our own `publish-homebrew.yml`, which mints a short-lived token from
# the org GitHub App (durable, no static PAT) rather than a stored secret.
# install.sh / install.ps1 + the self-updater cover upgrades.
installers = ["shell", "powershell", "homebrew"]
# Homebrew tap the formula targets: `brew install nixie-tech-llc/tap/lait`
# (github.com/Nixie-Tech-LLC/homebrew-tap). cargo-dist only *generates* lait.rb as
# a release asset — the push to the tap (and the Scoop/winget publishes) is done by
# our own `publish-*.yml` workflows, triggered on the Release workflow completing
# (`workflow_run`), which fires even though cargo-dist creates the release with the
# default GITHUB_TOKEN (a `release:` trigger would not).
tap = "Nixie-Tech-LLC/homebrew-tap"
# Target platforms to build apps for (Rust target-triple syntax). Windows is
# now included: the daemon's control channel is a cross-platform local IPC
# channel (named pipe on Windows via `interprocess`), and the single-instance
# lock is a portable advisory lock (`fs2`), so the binary builds and runs on
# Windows the same as unix.
targets = [
    "aarch64-apple-darwin",
    "aarch64-unknown-linux-gnu",
    "x86_64-apple-darwin",
    "x86_64-unknown-linux-gnu",
    "x86_64-pc-windows-msvc",
]
# Path that installers should place binaries in
install-path = "CARGO_HOME"
# Where to host releases
hosting = "github"
# Ship no external updater: `lait update` is a native, in-process self-updater
# (src/app.rs) that pulls the latest release itself.
install-updater = false
# Use gzip (not xz) for unix archives so the native updater can extract release
# assets with pure-Rust inflate (no liblzma/C dependency). Windows stays .zip.
unix-archive = ".tar.gz"
