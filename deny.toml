# cargo-deny: supply-chain gate. The load-bearing rule for this project is the
# `[bans]` list — it forbids the aws-lc-* rustls backends so the portable `ring`
# backend (which keeps cross-platform builds and easy cross-compiles working)
# can't drift back in transitively. Advisories and licenses round out the gate.

[graph]
all-features = true

[advisories]
version = 2
yanked = "deny"
# All ignored advisories below are in the transitive tree of iroh 1.0.0-rc.1
# (its network stack: netdev/netwatch/portmapper/plist, n0-error, etc.) — not in
# code this project controls, and not fixable without an iroh release. Revisit
# and prune this list when iroh moves past rc. New advisories NOT listed here
# still fail the gate.
ignore = [
    "RUSTSEC-2023-0089", # atomic-polyfill: unmaintained (transitive via iroh)
    "RUSTSEC-2024-0436", # paste: unmaintained (transitive via iroh)
    "RUSTSEC-2026-0190", # n0-error: unsound downcast_mut (iroh rc dep; upstream fix)
    "RUSTSEC-2026-0194", # transitive via iroh network stack
    "RUSTSEC-2026-0195", # transitive via iroh network stack
    "RUSTSEC-2026-0204", # quick-xml: alloc bound (transitive via iroh -> plist)
]

[bans]
multiple-versions = "allow"
wildcards = "allow"
# Keep the portable `ring` TLS backend; never pull the aws-lc-* backends (they
# need cmake + a C toolchain, and NASM on Windows).
deny = [
    { name = "aws-lc-rs" },
    { name = "aws-lc-sys" },
    { name = "aws-lc-fips-sys" },
]

[licenses]
version = 2
confidence-threshold = 0.8
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "MPL-2.0",
    "BSL-1.0",
    "CC0-1.0",
    "CDLA-Permissive-2.0",
    "Unlicense",
    "0BSD",
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
