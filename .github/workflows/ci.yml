# Cross-platform CI: builds and tests groupchat on Linux, macOS, and Windows so
# the daemon's control channel + single-instance lock stay portable. The Windows
# job is load-bearing — it fails the moment anyone reintroduces a unix-only API
# (a Unix-domain socket, flock(2), os::fd, …) into the control/lock path.
name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  # Build + test on every supported OS. This is the portability gate: the crate
  # must compile and its tests must pass on all three, not just unix.
  build-and-test:
    name: build & test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      # --locked pins the committed Cargo.lock, so the portable dependency set
      # (interprocess, fs2, and the `ring` TLS backend) can't drift under CI.
      - name: Build
        run: cargo build --locked --all-targets

      - name: Test
        run: cargo test --locked

  # Portability guard: keep the *portable* rustls backend. `ring` builds cleanly
  # across all targets; `aws-lc-rs`/`aws-lc-sys` drag in cmake + a C toolchain
  # (and NASM on Windows), which would break the single-binary, easy-cross-compile
  # story. Fail if either enters the dependency graph on any platform.
  portable-tls-backend:
    name: portable TLS backend (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Assert ring backend (no aws-lc-rs)
        shell: bash
        run: |
          set -euo pipefail
          bad=0
          for crate in aws-lc-rs aws-lc-sys aws-lc-fips-sys; do
            # `cargo tree -i <crate>` exits non-zero when the crate is absent.
            if cargo tree --locked -e no-dev -i "$crate" >/dev/null 2>&1; then
              echo "::error::$crate is in the dependency tree — the build must use the portable 'ring' rustls backend, not aws-lc-*."
              cargo tree --locked -e no-dev -i "$crate" || true
              bad=1
            fi
          done
          if [ "$bad" -eq 0 ]; then
            echo "OK: no aws-lc-* in the tree; portable 'ring' backend preserved."
          fi
          exit "$bad"
