# Cross-platform CI + supply-chain gate. Builds, lints, and tests groupchat on
# Linux, macOS, and Windows so the daemon's control channel + single-instance
# lock stay portable. The Windows job is load-bearing — it fails the moment
# anyone reintroduces a unix-only API (a Unix-domain socket, flock(2), os::fd, …)
# into the control/lock path.
name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  # Build, lint (fmt + clippy), test, smoke-run, and the TLS-backend
  # guard on every supported OS. This is the portability gate: everything must
  # be green on all three, not just unix. clippy runs per-OS so the cfg-gated
  # control channel (unix socket vs named pipe) is linted on both.
  check:
    name: check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    env:
      RUSTFLAGS: "-D warnings"
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable + rustfmt + clippy)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --all-targets --locked -- -D warnings

      # --locked pins the committed Cargo.lock, so the portable dependency set
      # (interprocess, fs2, and the `ring` TLS backend) can't drift under CI.
      - name: Build
        run: cargo build --locked --all-targets

      - name: Test
        run: cargo test --locked --all-targets

      # `--all-targets` skips doctests; run them explicitly so documented
      # examples (and the DTO/parity doc examples) can't rot.
      - name: Doctests
        run: cargo test --locked --doc

      # Portability guard: the control channel + single-instance lock MUST stay
      # cross-platform. Fail if a unix-only primitive is named outside an
      # explicit #[cfg(unix)] island in those paths. The Windows job compiling is
      # the primary gate; this catches a regression at review time on any OS.
      - name: Portability guard (no unix-only APIs in control/lock path)
        shell: bash
        run: bash ci/portability-guard.sh

      # End-to-end smoke against the REAL binary (no network): drive the P0
      # tracker flow — create a project + issues, render the board, edit an
      # issue, and read the activity feed — asserting on observed output. Proves
      # the daemon + control channel + Loro store + CLI all work on this OS.
      # Grows per phase (P1: two nodes converge + a TUI client rebaselines on
      # Reset; P3: a non-member sees only ciphertext).
      - name: Smoke run (P0 tracker flow)
        shell: bash
        run: |
          set -euo pipefail
          export GROUPCHAT_HOME="$(mktemp -d)"
          export GROUPCHAT_IDLE_SECS=0
          # Capture output into a variable rather than piping into `grep -q`: an
          # early-closing reader (grep -q, head) would send SIGPIPE to the CLI —
          # which now resets SIGPIPE to default for clean interactive piping — and
          # under `pipefail` that races the smoke. Capturing drains stdout fully,
          # so the assertions are deterministic regardless of buffering/timing.
          bin() { cargo run --locked --quiet -- "$@"; }
          has() { case "$1" in *"$2"*) : ;; *) echo "::error::expected '$2' in:"; echo "$1"; exit 1 ;; esac; }
          # id is 64 lowercase hex chars
          id_out="$(bin id)"
          [[ "$id_out" =~ ^[0-9a-f]{64}$ ]] || { echo "::error::bad id: $id_out"; exit 1; }
          bin projects new "Engineering" --key ENG
          bin new "fix login race" -p ENG -P high >/dev/null
          bin new "add dark mode"  -p ENG -P low  >/dev/null
          # board shows both issues in Backlog
          board="$(bin board ENG)"; has "$board" "fix login race"; has "$board" "add dark mode"
          # edit by KEY-n alias moves it to In Progress
          bin edit ENG-1 --status in_progress
          board="$(bin board ENG)"; has "$board" "In Progress"; has "$board" "fix login race"
          # completion removes it from the active board list into Done
          bin edit ENG-2 --status done
          ls_out="$(bin ls)"; has "$ls_out" "fix login race"
          # activity feed records the transitions
          act="$(bin activity)"; has "$act" "created"; has "$act" "edited"
          bin stop || true
          echo "P0 smoke flow OK on ${{ matrix.os }}"

      # Defense-in-depth beyond the cargo-deny ban: fail if the aws-lc-* rustls
      # backend is selected on THIS platform (a backend swap can be per-target).
      - name: Assert portable TLS backend (no aws-lc-*)
        shell: bash
        run: |
          set -euo pipefail
          bad=0
          for crate in aws-lc-rs aws-lc-sys aws-lc-fips-sys; do
            if cargo tree --locked -e no-dev -i "$crate" >/dev/null 2>&1; then
              echo "::error::$crate is in the dependency tree — the build must use the portable 'ring' rustls backend."
              bad=1
            fi
          done
          exit "$bad"

  # Verify the MSRV floor holds. The floor is driven by iroh 1.0.0-rc.1 (rustc
  # 1.91). If this breaks, either the floor moved or a dep raised its MSRV.
  msrv:
    name: msrv (1.91)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust 1.91
        uses: dtolnay/rust-toolchain@1.91.0
      - uses: Swatinem/rust-cache@v2
      - name: Check on MSRV
        run: cargo check --locked --all-targets

  # Supply-chain gate: advisories + licenses + bans + sources (deny.toml). The
  # bans list forbids the aws-lc-* backends so the portable `ring` backend can't
  # drift in transitively.
  supply-chain:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: cargo-deny
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check

  # Release dry-run: `dist plan` must succeed for every configured target
  # (including the Windows target added now that the control channel is
  # portable). This gates release-engineering drift on every PR, long before a
  # tag is pushed. It only PLANS — it never builds or publishes.
  release-dry-run:
    name: release dry-run (dist plan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dist
        shell: bash
        run: curl --proto '=https' --tlsv1.2 -LsSf https://github.com/axodotdev/cargo-dist/releases/download/v0.32.0/cargo-dist-installer.sh | sh
      - name: dist plan (all targets, incl. Windows)
        shell: bash
        run: |
          set -euo pipefail
          dist plan --output-format=json > plan.json
          cat plan.json
          # Assert the Windows target is present in the plan so it can't silently
          # regress back out of the release matrix.
          grep -q 'x86_64-pc-windows-msvc' plan.json \
            || { echo "::error::Windows target missing from dist plan"; exit 1; }
