# CD: publish the crate to crates.io (which also gives docs.rs API docs) so
# `cargo install lait` works.
#
# Triggered on the **Release** workflow completing (`workflow_run`), like the other
# publishers, and checks out the exact commit that release built from. `cargo publish`
# is idempotent-ish: it errors if the version already exists, so re-running a
# published version is a no-op-ish failure, not a double publish.
#
# Auth is crates.io **trusted publishing**: the job mints a short-lived token by
# exchanging this workflow's OIDC identity (hence `id-token: write`), so there is no
# long-lived `CARGO_REGISTRY_TOKEN` secret in the repo to leak or rotate. crates.io
# must have the trusted publisher registered for this exact repo + workflow filename
# (crates.io -> lait -> Settings -> Trusted Publishing); if it isn't registered, the
# auth step fails closed and nothing publishes.
#
# Every third-party action is pinned to a full commit SHA, not a tag or branch. This
# job briefly holds a crates.io publish token, so a mutable ref here would let an
# upstream compromise publish as us. Note `dtolnay/rust-toolchain`'s version refs
# (`stable`, `1.91.0`) are *branches*, not tags — pinning by name is not pinning.
name: Publish to crates.io

on:
  workflow_run:
    workflows: ["Release"]
    types: [completed]
  workflow_dispatch:
    inputs:
      ref:
        description: "Tag or commit to publish (e.g. v0.4.4)"
        required: true

permissions:
  contents: read

jobs:
  crates:
    name: cargo publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # Mint the OIDC token that crates.io trades for a short-lived publish token.
      id-token: write
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       startsWith(github.event.workflow_run.head_branch, 'v'))
    steps:
      - name: Resolve ref
        id: gate
        env:
          DISPATCH_REF: ${{ github.event.inputs.ref }}
          RUN_SHA: ${{ github.event.workflow_run.head_sha }}
        shell: bash
        run: |
          set -euo pipefail
          echo "ref=${DISPATCH_REF:-$RUN_SHA}" >> "$GITHUB_OUTPUT"

      # actions/checkout@v6.0.3
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          ref: ${{ steps.gate.outputs.ref }}
          persist-credentials: false

      # Publishing on the MSRV floor verifies the crate still builds on its declared
      # `rust-version`. rust-toolchain.toml (channel = "stable") would otherwise
      # override the 1.91 toolchain installed here — rustup ranks that file above the
      # default — so the publish step pins RUSTUP_TOOLCHAIN explicitly.
      #
      # dtolnay/rust-toolchain@1.91.0 (branch head at time of pinning)
      #
      # This carried `with: toolchain: "1.91"`, which never did anything: unlike the
      # @stable branch, the version branches declare NO `toolchain` input — the
      # branch name IS the toolchain, baked into that commit. The input was silently
      # dropped with an "Unexpected input(s)" warning on every release. The job still
      # got 1.91 (from the branch), so nothing was broken — but the line claimed to
      # set something it did not, so it is gone. The comment above records the
      # version; RUSTUP_TOOLCHAIN on the publish step is what actually overrides
      # rust-toolchain.toml.
      - name: Install Rust (publish on the MSRV floor, 1.91)
        uses: dtolnay/rust-toolchain@ad7910d95e317a4b12a9a3dfad520f4b409b3ec0

      # rust-lang/crates-io-auth-action@v1.0.5
      # Last step before publish, so the token's lifetime spans as few steps as
      # possible and no third-party action runs while it's in scope.
      #
      # `continue-on-error` so a release still ships while the trusted publisher is
      # being registered on crates.io: this step fails until it exists, and the
      # publish below falls back to CARGO_REGISTRY_TOKEN. The fallback is loud, not
      # silent — see the notice — so it can't quietly become the permanent path.
      # Once a publish succeeds via OIDC, drop the fallback and delete the secret.
      - name: Authenticate to crates.io (trusted publishing)
        id: auth
        continue-on-error: true
        uses: rust-lang/crates-io-auth-action@c6f97d42243bad5fab37ca0427f495c86d5b1a18

      - name: cargo publish
        env:
          # Step-scoped, not job-scoped: only this step sees a credential, so no
          # third-party action ever runs with one in its environment.
          OIDC_TOKEN: ${{ steps.auth.outputs.token }}
          FALLBACK_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          RUSTUP_TOOLCHAIN: "1.91"
        shell: bash
        run: |
          set -euo pipefail
          if [ -n "${OIDC_TOKEN:-}" ]; then
            echo "::notice::Publishing via crates.io trusted publishing (short-lived token)."
            export CARGO_REGISTRY_TOKEN="$OIDC_TOKEN"
          elif [ -n "${FALLBACK_TOKEN:-}" ]; then
            echo "::warning::Trusted publishing unavailable — falling back to the long-lived CARGO_REGISTRY_TOKEN. Register the trusted publisher (crates.io -> lait -> Settings -> Trusted Publishing: Nixie-Tech-LLC/lait, workflow publish-crates.yml), then delete this secret."
            export CARGO_REGISTRY_TOKEN="$FALLBACK_TOKEN"
          else
            echo "::error::No crates.io credential: trusted publishing is not registered and CARGO_REGISTRY_TOKEN is unset."
            exit 1
          fi
          cargo publish --locked
