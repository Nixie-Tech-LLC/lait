[package]
name = "groupchat"
version = "0.2.4"
edition = "2021"
# MSRV: driven by iroh 1.0.0-rc.1, which requires rustc 1.91.
rust-version = "1.91"
description = "A peer-to-peer node built on iroh — the transport/identity/presence foundation for a P2P issue tracker"
authors = ["onnixi <omar@onnixi.com>"]
license = "MIT OR Apache-2.0"
# Release host (cargo-dist builds/publishes binaries here). Source of record is the homepage.
repository = "https://github.com/Nixie-Tech-LLC/groupchat"
homepage = "https://gitlab.com/onnixi/groupchat"
readme = "README.md"
keywords = ["iroh", "p2p", "gossip", "crdt", "issue-tracker"]
categories = ["command-line-utilities", "network-programming"]

[[bin]]
name = "groupchat"
path = "src/main.rs"

[dependencies]
# iroh core + gossip (the room/announce transport). iroh-blobs returns at P2 for
# snapshots/attachments. All pin iroh =1.0.0-rc.1.
iroh = "=1.0.0-rc.1"
iroh-base = "=1.0.0-rc.1"
iroh-gossip = "0.100"

# async runtime + streams
tokio = { version = "1", features = ["full"] }
n0-future = "0.3"

# cli
clap = { version = "4", features = ["derive"] }

# serialization: serde_json for state/control protocol, postcard for wire messages
serde = { version = "1", features = ["derive"] }
serde_json = "1"
postcard = { version = "1", features = ["use-std"] }
serde-byte-array = "0.1"
bytes = "1"
data-encoding = "2.6"
blake3 = "1"

# cross-platform local IPC for the daemon control channel: a Unix-domain socket
# on unix, a named pipe on Windows — same API, so the daemon/CLI/MCP are portable.
interprocess = { version = "2", features = ["tokio"] }
# cross-platform advisory file lock for the single-instance daemon guard
# (replaces the unix-only flock(2)).
fs2 = "0.4"

# misc
anyhow = "1"
directories = "5"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# mcp server (stdio)
rmcp = { version = "1.7", features = ["server", "macros", "transport-io"] }

# The profile that 'dist' will build with
[profile.dist]
inherits = "release"
lto = "thin"
