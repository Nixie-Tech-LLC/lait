[package]
name = "lait"
version = "0.4.1"
edition = "2021"
# MSRV: driven by iroh 1.0.0-rc.1, which requires rustc 1.91.
rust-version = "1.91"
description = "A local-first, peer-to-peer, end-to-end-encrypted issue tracker built on iroh + Loro CRDTs"
authors = ["onnixi <omar@onnixi.com>"]
license = "MIT OR Apache-2.0"
# Release host (cargo-dist builds/publishes binaries here). Source of record is the homepage.
repository = "https://github.com/Nixie-Tech-LLC/lait"
homepage = "https://gitlab.com/onnixi/lait"
readme = "README.md"
keywords = ["iroh", "p2p", "gossip", "crdt", "issue-tracker"]
categories = ["command-line-utilities", "network-programming"]

[lib]
name = "lait"
path = "src/lib.rs"

[[bin]]
name = "lait"
path = "src/main.rs"

[dependencies]
# Loro CRDT — the storage/truth layer (Layer A). Issue docs + the catalog doc.
loro = "=1.13.6"
# randomness for ULID minting (app-minted DocId/ProjectId/… ids).
getrandom = "0.3"

# TUI (ratatui + crossterm) — the interactive board client. crossterm is the
# portable backend (all three OSes), matching the cross-platform bar.
ratatui = "0.29"
crossterm = { version = "0.28", features = ["event-stream"] }

# E2EE (P3) — all pure-Rust (RustCrypto/dalek), no C toolchain, no aws-lc:
# ed25519 signing for the ACL op-graph, X25519 sealed boxes for workspace-key
# distribution (ed25519→x25519 conversion), ChaCha20-Poly1305 AEAD for the
# encrypted sync payloads (the blind-relay envelope).
ed25519-dalek = "2"
x25519-dalek = { version = "2", features = ["static_secrets"] }
curve25519-dalek = "4"
chacha20poly1305 = "0.10"
sha2 = "0.10"
# iroh core + gossip (the room/announce transport). iroh-blobs returns at P2 for
# snapshots/attachments. All pin iroh =1.0.0-rc.1.
iroh = "=1.0.0-rc.1"
iroh-base = "=1.0.0-rc.1"
iroh-gossip = "0.100"

# async runtime + streams
tokio = { version = "1", features = ["full"] }
n0-future = "0.3"

# cli
clap = { version = "4", features = ["derive"] }

# serialization: serde_json for state/control protocol, postcard for wire messages
serde = { version = "1", features = ["derive"] }
serde_json = "1"
postcard = { version = "1", features = ["use-std"] }
serde-byte-array = "0.1"
bytes = "1"
data-encoding = "2.6"
blake3 = "1"

# cross-platform local IPC for the daemon control channel: a Unix-domain socket
# on unix, a named pipe on Windows — same API, so the daemon/CLI/MCP are portable.
interprocess = { version = "2", features = ["tokio"] }
# cross-platform advisory file lock for the single-instance daemon guard
# (replaces the unix-only flock(2)).
fs2 = "0.4"

# misc
anyhow = "1"
directories = "5"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# mcp server (stdio)
rmcp = { version = "1.7", features = ["server", "macros", "transport-io"] }
# Native `lait update`: GitHub-release self-updater. `ureq` backend + `rustls`
# keeps it pure-Rust (no reqwest/native-tls/OpenSSL C dep); gzip/zip extraction
# only (no xz), matching the `.tar.gz` release archives.
self_update = { version = "0.44.0", default-features = false, features = ["ureq", "rustls", "archive-tar", "archive-zip", "compression-flate2", "compression-zip-deflate"] }

# unix-only: reset SIGPIPE to default so piping CLI output to head/less/grep
# exits cleanly instead of panicking (Rust ignores SIGPIPE by default). Already
# present transitively (tokio); declared directly for the startup reset in app.rs.
[target.'cfg(unix)'.dependencies]
libc = "0.2"

[dev-dependencies]
# property-based convergence testing (random op sequences across N peers).
proptest = "1"

# The profile that 'dist' will build with
[profile.dist]
inherits = "release"
lto = "thin"
